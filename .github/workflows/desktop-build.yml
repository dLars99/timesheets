name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            web/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundles (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri:build

      - name: Deep sign app bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: codesign --force --deep --sign - ../src-tauri/target/release/bundle/macos/Timesheets.app

      - name: Build desktop bundles (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm tauri:build

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: timesheets-macos
          path: |
            web/src-tauri/target/release/bundle/dmg/*.dmg
            web/src-tauri/target/release/bundle/macos/*.app
            scripts/install-mac.sh
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: timesheets-windows
          path: |
            web/src-tauri/target/release/bundle/msi/*.msi
            web/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
