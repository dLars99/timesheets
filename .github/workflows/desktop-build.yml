name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-desktop:
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            web/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundles (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri:build

      - name: Deep sign app bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: codesign --force --deep --sign - ./src-tauri/target/release/bundle/macos/Timesheets.app

      - name: Build desktop bundles (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm tauri:build

      - name: Azure login (Windows)
        if: matrix.os == 'windows-latest'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\\web\\src-tauri\\target\\release\\bundle
          files-folder-filter: exe,msi
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Stage macOS artifacts
        if: matrix.os == 'macos-latest'
        run: |
          set -euo pipefail
          mkdir -p ./artifacts/macos
          cp ./src-tauri/target/release/bundle/dmg/*.dmg ./artifacts/macos/
          ditto -c -k --sequesterRsrc --keepParent ./src-tauri/target/release/bundle/macos/Timesheets.app ./artifacts/macos/Timesheets.app.zip
          cp ../scripts/install-mac.sh ./artifacts/macos/

      - name: Stage Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\windows | Out-Null
          Copy-Item .\src-tauri\target\release\bundle\msi\*.msi -Destination .\artifacts\windows -ErrorAction Stop
          Copy-Item .\src-tauri\target\release\bundle\nsis\*.exe -Destination .\artifacts\windows -ErrorAction Stop

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: timesheets-macos
          path: web/artifacts/macos
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: timesheets-windows
          path: web/artifacts/windows
          if-no-files-found: warn
